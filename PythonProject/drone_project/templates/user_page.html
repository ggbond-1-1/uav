<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>普通用户页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #333;
        }
        p {
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>欢迎来到普通用户页面</h1>
        <p>这里是普通用户可以访问的区域，你可以查看一些基本信息或进行一些常规操作。</p>
        <!-- 这里可以添加更多普通用户功能的链接或按钮 -->
        <a href="#">查看个人信息</a>
        <a href="#">进行操作</a>
    </div>
</body>
</html>
