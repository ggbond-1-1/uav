<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无人机管理平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        /* 顶部导航栏 */
        .top-navbar {
            background-color: #007BFF;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-buttons {
            display: flex;
        }

        .nav-button {
            display: flex;
            align-items: center;
            margin-left: 15px;
            cursor: pointer;
        }

        .nav-button span {
            margin-left: 5px;
        }

        .circle {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 5px;
        }

        /* 左侧边栏 */
        .left-sidebar {
            background-color: #e0f2f1;
            width: 200px;
            height: 100vh;
            padding: 15px;
        }

        .sidebar-button {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: white;
            cursor: pointer;
        }

        /* 右侧表格区域 */
        .main-table {
            flex: 1;
            padding: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }
    </style>
</head>

<body>
    <!-- 顶部导航栏 -->
    <div class="top-navbar">
        <div>名称</div>
        <div class="nav-buttons">
            <div class="nav-button">
                <span class="circle" style="background-color: #800080;"></span>
                <span>首页</span>
            </div>
            <div class="nav-button">
                <span class="circle" style="background-color: #800080;"></span>
                <span>模块一</span>
            </div>
            <div class="nav-button">
                <span class="circle" style="background-color: #800080;"></span>
                <span>模块二</span>
            </div>
            <div class="nav-button">
                <span class="circle" style="background-color: #800080;"></span>
                <span>模块三</span>
            </div>
        </div>
    </div>
    <!-- 主体部分 -->
    <div style="display: flex;">
        <!-- 左侧边栏 -->
        <div class="left-sidebar">
            <button class="sidebar-button">注册我的无人机</button>
            <button class="sidebar-button">个人信息管理</button>
            <button class="sidebar-button">管理我的无人机</button>
        </div>
        <!-- 右侧表格区域 -->
        <div class="main-table">
            <table>
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>状态</th>
                        <th>登记日期</th>
                        <th>操作</th>
                        <th>详情</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- 这里可以通过JavaScript动态添加数据 -->
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
