<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无人机管理系统</title>
    <style>
        /* 全局样式初始化 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        /* 顶部导航栏样式 */
        .top-navbar {
            background-color: #007BFF;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-buttons {
            display: flex;
        }

        .nav-button {
            display: flex;
            align-items: center;
            margin-left: 15px;
            cursor: pointer;
        }

        .nav-button span {
            margin-left: 5px;
        }

        .circle {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 5px;
        }

        /* 左侧栏样式 */
        .left-sidebar {
            background-color: #e0f2f1;
            width: 200px;
            height: 100vh;
            padding: 15px;
        }

        .sidebar-button {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: white;
            cursor: pointer;
        }

        /* 右侧主内容区样式 */
        .main-content {
            flex: 1;
            padding: 30px;
        }

        .form-item {
            margin-bottom: 20px;
            font-size: 24px;
        }

        .form-item label {
            display: inline-block;
            width: 200px;
        }

        .form-item input {
            width: 300px;
            height: 30px;
            border: none;
            border-bottom: 1px solid #000;
            background: transparent;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <!-- 顶部导航栏 -->
    <div class="top-navbar">
        <div>名称</div>
        <div class="nav-buttons">
            <div class="nav-button">
                <span class="circle" style="background-color: #800080;"></span>
                <span>首页</span>
            </div>
            <div class="nav-button">
                <span class="circle" style="background-color: #800080;"></span>
                <span>模块一</span>
            </div>
            <div class="nav-button">
                <span class="circle" style="background-color: #800080;"></span>
                <span>模块二</span>
            </div>
            <div class="nav-button">
                <span class="circle" style="background-color: #800080;"></span>
                <span>模块三</span>
            </div>
        </div>
    </div>
    <!-- 主体部分 -->
    <div style="display: flex;">
        <!-- 左侧栏 -->
        <div class="left-sidebar">
            <button class="sidebar-button">注册我的无人机</button>
            <button class="sidebar-button">个人信息管理</button>
            <button class="sidebar-button">管理我的无人机</button>
        </div>
        <!-- 右侧主内容区 -->
        <div class="main-content">
            <div class="form-item">
                <label>无人机型号：</label>
                <input type="text" placeholder="">
            </div>
            <div class="form-item">
                <label>生产厂家：</label>
                <input type="text" placeholder="">
            </div>
            <div class="form-item">
                <label>购买日期：</label>
                <input type="date" placeholder="">
            </div>
            <div class="form-item">
                <label>保修截止日期：</label>
                <input type="date" placeholder="">
            </div>
            <div class="form-item">
                <label>最大起飞重量：</label>
                <input type="text" placeholder="">
            </div>
            <div class="form-item">
                <label>最大起飞速度：</label>
                <input type="text" placeholder="">
            </div>
        </div>
    </div>
</body>

</html>
