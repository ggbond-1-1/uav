<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无人机管理平台登录</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: url('drone-in-warehouse.jpg');
            background-size: cover;
            background-position: center;
        }

        .login-box {
            width: 100%;
            max-width: 350px;
            background-color: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .login-title {
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .input-field {
            margin-bottom: 20px;
        }

        .input-field input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .links {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .links a {
            color: #007BFF;
            text-decoration: none;
        }

        .login-button {
            width: 100%;
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .login-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <div class="login-title">登录</div>
        <div class="input-field">
            <input type="text" placeholder="账号">
        </div>
        <div class="input-field">
            <input type="password" placeholder="密码">
        </div>
        <div class="links">
            <a href="#">没有账号？立即注册</a>
            <a href="#">忘记密码？找回密码</a>
        </div>
        <button class="login-button">登录</button>
    </div>
</body>

</html>
