<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>界面设计草图实现</title>
    <style>
        /* 全局样式初始化 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 顶部导航栏样式 */
        .top-navbar {
            background-color: #007BFF;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }

        .nav-title {
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .nav-buttons {
            display: flex;
        }

        .nav-button {
            display: flex;
            align-items: center;
            color: white;
            margin-left: 20px;
            cursor: pointer;
            font-size: 16px;
        }

        .nav-button .circle {
            width: 12px;
            height: 12px;
            background-color: #800080;
            border-radius: 50%;
            margin-right: 8px;
        }

        /* 内容区域样式 */
        .content {
            padding: 50px;
        }

        .section {
            margin-bottom: 120px; /* 增加板块之间的空白距离 */
        }

        .section-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        /* 表格样式 */
        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th,
        .table td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        .table th {
            background-color: #f2f2f2;
        }
    </style>
</head>

<body>
    <!-- 顶部导航栏 -->
    <div class="top-navbar">
        <div class="nav-title">名称</div>
        <div class="nav-buttons">
            <div class="nav-button">
                <div class="circle"></div>
                首页
            </div>
            <div class="nav-button">
                <div class="circle"></div>
                模块一
            </div>
            <div class="nav-button">
                <div class="circle"></div>
                模块二
            </div>
            <div class="nav-button">
                <div class="circle"></div>
                模块三
            </div>
        </div>
    </div>
    <!-- 内容区域 -->
    <div class="content">
        <!-- 用户基本信息板块 -->
        <div class="section">
            <div class="section-title">用户基本信息</div>
        </div>
        <!-- 任务日志板块 -->
        <div class="section">
            <div class="section-title">任务日志</div>
            <table class="table">
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>时间</th>
                        <th>任务状态</th>
                        <th>详情</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- 可后续通过 JavaScript 动态添加表格数据 -->
                </tbody>
            </table>
        </div>
        <!-- 消息通知板块 -->
        <div class="section">
            <div class="section-title">消息通知</div>
            <table class="table">
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>消息时间</th>
                        <th>消息内容</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- 可后续通过 JavaScript 动态添加表格数据 -->
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
